name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build monorepo
        run: pnpm build
        env:
          VITE_BASE_URL: /thesis-poc/

      - name: Prepare deployment artifact
        run: |
          mkdir -p deploy
          cp -r packages/frontend/dist/* deploy/
          cp index.html deploy/legacy-poc.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v4
        with:
          path: deploy

      - id: deployment
        uses: actions/deploy-pages@v4
